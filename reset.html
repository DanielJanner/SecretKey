<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Definir nova senha</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ee;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success-bg: #ecfdf3;
      --success-text: #166534;
      --error-bg: #fef2f2;
      --error-text: #991b1b;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, #e8f0ff 0%, transparent 35%),
        radial-gradient(circle at bottom right, #eefbf5 0%, transparent 30%),
        var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .logo {
    width: 200px;
    height: 200%;
    border-radius: 14px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
    
    }

    .logo img {
    max-width: 80%;
    max-height: 80%;
    object-fit: contain;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .status-line {
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: bold;
    }

    input[type="password"] {
      width: 100%;
      height: 46px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="password"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-direction: column;
    }

    button {
      width: 100%;
      height: 46px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.04s;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .secondary:hover {
      background: #f8fafc;
    }

    .message {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .message.success {
      display: block;
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid #bbf7d0;
    }

    .message.error {
      display: block;
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid #fecaca;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .debug {
      margin-top: 20px;
      background: #0f172a;
      color: #dbeafe;
      border-radius: 12px;
      padding: 14px;
      font-size: 12px;
      overflow: auto;
      max-height: 240px;
      display: none;
    }

    .debug.visible {
      display: block;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
  
    <div class="logo">
        <img src="img/SigNow.png" alt="Logo" />
    </div>


    <h1>Definir nova senha</h1>
    <p class="subtitle">
      Digite sua nova senha para concluir a recuperação de acesso.
    </p>

    <div id="status" class="status-line">
      Aguardando link de recuperação...
    </div>

    <div id="form-area" class="hidden">
      <div class="field">
        <label for="new-password">Nova senha</label>
        <input
          id="new-password"
          type="password"
          placeholder="Digite a nova senha"
          autocomplete="new-password"
        />
      </div>

      <div class="field">
        <label for="confirm-password">Confirmar nova senha</label>
        <input
          id="confirm-password"
          type="password"
          placeholder="Digite novamente a nova senha"
          autocomplete="new-password"
        />
      </div>

      <div class="actions">
        <button id="btn-update">Atualizar senha</button>
        <button id="btn-debug" class="secondary" type="button">
          Mostrar detalhes técnicos
        </button>
      </div>
    </div>

    <div id="message" class="message"></div>

    <pre id="output" class="debug"></pre>

    <div class="footer-note">
      Ambiente de teste de autenticação Supabase
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://ceewgklatdsnzifgjcmk.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable__Jeuo_3E3hNHFVyzdm2XdQ_zYjENdsc'

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusEl = document.getElementById('status');
    const formArea = document.getElementById('form-area');
    const messageEl = document.getElementById('message');
    const output = document.getElementById('output');
    const btnDebug = document.getElementById('btn-debug');
    const btnUpdate = document.getElementById('btn-update');
    const newPasswordInput = document.getElementById('new-password');
    const confirmPasswordInput = document.getElementById('confirm-password');

    let recoveryReady = false;

    function showDebug(data) {
      output.textContent = JSON.stringify(data, null, 2);
    }

    function showMessage(type, text) {
      messageEl.className = `message ${type}`;
      messageEl.textContent = text;
    }

    function clearMessage() {
      messageEl.className = 'message';
      messageEl.textContent = '';
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function enableForm() {
      recoveryReady = true;
      formArea.classList.remove('hidden');
      setStatus('Sessão de recuperação validada. Agora defina sua nova senha.');
    }

    function disableForm() {
      recoveryReady = false;
      formArea.classList.add('hidden');
    }

    btnDebug.addEventListener('click', () => {
      output.classList.toggle('visible');
      btnDebug.textContent = output.classList.contains('visible')
        ? 'Ocultar detalhes técnicos'
        : 'Mostrar detalhes técnicos';
    });

    async function initRecoverySession() {
      clearMessage();
      disableForm();

      const url = new URL(window.location.href);
      const code = url.searchParams.get('code');

      showDebug({
        href: window.location.href,
        search: window.location.search,
        hash: window.location.hash,
        code
      });

      if (code) {
        setStatus('Código de recuperação encontrado. Validando sessão...');

        const { data, error } = await supabase.auth.exchangeCodeForSession(code);
        showDebug({ step: 'exchangeCodeForSession', data, error });

        if (error) {
          setStatus('Falha ao validar a recuperação.');
          showMessage('error', `Erro ao validar recuperação: ${error.message}`);
          return;
        }

        enableForm();
        return;
      }

      const { data, error } = await supabase.auth.getSession();
      showDebug({ step: 'getSession', data, error });

      if (error) {
        setStatus('Erro ao verificar a sessão.');
        showMessage('error', `Erro ao verificar sessão: ${error.message}`);
        return;
      }

      if (data?.session) {
        enableForm();
      } else {
        setStatus('Nenhuma sessão de recuperação encontrada no link.');
        showMessage('error', 'Abra novamente o link enviado por email para redefinir a senha.');
      }
    }

    supabase.auth.onAuthStateChange(async (event, session) => {
      showDebug({ step: 'onAuthStateChange', event, session });

      if (event === 'PASSWORD_RECOVERY') {
        enableForm();
      }
    });

    btnUpdate.addEventListener('click', async () => {
      clearMessage();

      if (!recoveryReady) {
        showMessage('error', 'A recuperação ainda não foi validada.');
        return;
      }

      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!newPassword || newPassword.length < 6) {
        showMessage('error', 'A nova senha deve ter pelo menos 6 caracteres.');
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage('error', 'A confirmação da senha não confere.');
        return;
      }

      btnUpdate.disabled = true;
      btnUpdate.textContent = 'Atualizando...';

      try {
        const { data, error } = await supabase.auth.updateUser({
          password: newPassword
        });

        showDebug({ step: 'updateUser', data, error });

        if (error) {
          showMessage('error', `Erro ao atualizar senha: ${error.message}`);
          return;
        }

        setStatus('Senha atualizada com sucesso.');
        showMessage('success', 'Sua senha foi redefinida. Agora você já pode fazer login com a nova senha.');
        newPasswordInput.value = '';
        confirmPasswordInput.value = '';
      } catch (err) {
        showDebug({ unexpectedError: String(err) });
        showMessage('error', 'Ocorreu um erro inesperado ao atualizar a senha.');
      } finally {
        btnUpdate.disabled = false;
        btnUpdate.textContent = 'Atualizar senha';
      }
    });

    window.addEventListener('load', initRecoverySession);
  </script>
</body>
</html>
